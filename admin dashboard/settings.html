        <div class="avatar">
            <img src="https://static.vecteezy.com/system/resources/previews/067/619/141/non_2x/flat-style-cartoon-boy-avatar-smiling-male-profile-icon-for-app-web-and-social-media-vector.jpg" alt="profile avatar">

    <main class="main-content">
        <h1>Website Setting</h1>
        <div class="settings-card">
            <h2>Profile Setting</h2>
            <div class="grid">
                <input type="text" placeholder="Admin Name">
                <input type="email" placeholder="Admin Email">
                <input type="tel" placeholder="Phone No">
                <input type="text" placeholder="Location">
            </div>
        </div>
        <div class="settings-card">
            <h2>Website Setting</h2>
            <div class="grid">
                <input type="color" placeholder="Website Color Code">
                <input type="url" placeholder="Website Url">
                <input type="text" placeholder="Description">
                <input type="text" placeholder="Owner">
            </div>
        </div>

       <div class="settings-card">
          <h2>Notification</h2>
          <label>
             <input type="checkbox" >&nbsp;&nbsp;Email Notification
          </label>
          <label>
             <input type="checkbox" >&nbsp;&nbsp;SMS Notification
          </label>
          <label>
             <input type="checkbox" >&nbsp;&nbsp;Sytem Update
          </label>
       </div>

       <div class="settings-card">
          <h2>Term & Conditions, Privacy Policy</h2>
          <div class="grid-text">
             <label>Privacy Policy
                <textarea rows="5" cols="25" id="" >Hello World</textarea>
             </label>   
          </div>
          <div class="grid-text">
             <label>Privacy Policy
                <textarea rows="5" cols="25" id="" >Hello World</textarea>
             </label>   
          </div>
       </div>
      <button>Save All Changes</button>

    </main>
